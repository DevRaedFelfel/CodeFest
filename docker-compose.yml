services:
  api:
    build:
      context: .
      dockerfile: CodeFest.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=codefest;Username=codefest;Password=${POSTGRES_PASSWORD}
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codefest-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codefest
      POSTGRES_USER: codefest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefest -d codefest"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codefest-net

volumes:
  pg-data:

networks:
  codefest-net:
    driver: bridge
