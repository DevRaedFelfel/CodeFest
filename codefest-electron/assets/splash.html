<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeFest Exam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      color: #00d4ff;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #8888aa;
      margin-bottom: 2.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 0.95rem;
      color: #6666aa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CodeFest</div>
    <div class="subtitle">Secure Exam Client</div>
    <div class="spinner"></div>
    <div class="status">Connecting to server...</div>
  </div>
</body>
</html>
